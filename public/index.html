<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Convertor — PDF to Word</title>
    <!-- PDF.js for client-side PDF text extraction -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- docx.js for client-side .docx generation -->
    <script src="https://unpkg.com/docx@9.6.1/dist/index.iife.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        padding: 48px 40px;
        width: 100%;
        max-width: 480px;
        text-align: center;
      }

      h1 {
        font-size: 1.6rem;
        color: #1a202c;
        margin-bottom: 6px;
      }

      .subtitle {
        color: #718096;
        font-size: 0.95rem;
        margin-bottom: 32px;
      }

      .drop-zone {
        border: 2px dashed #cbd5e0;
        border-radius: 8px;
        padding: 32px 16px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        margin-bottom: 24px;
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: #4299e1;
        background: #ebf8ff;
      }

      .drop-zone svg {
        width: 48px;
        height: 48px;
        margin-bottom: 12px;
        color: #a0aec0;
      }

      .drop-zone p {
        color: #4a5568;
        font-size: 0.9rem;
      }

      .drop-zone p span {
        color: #4299e1;
        text-decoration: underline;
        cursor: pointer;
      }

      #fileInput { display: none; }

      #fileName {
        font-size: 0.85rem;
        color: #2d3748;
        margin-bottom: 16px;
        min-height: 20px;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #4299e1;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover:not(:disabled) { background: #3182ce; }
      button:disabled { background: #a0aec0; cursor: not-allowed; }

      #status {
        margin-top: 18px;
        font-size: 0.9rem;
        min-height: 22px;
      }

      .status-error { color: #e53e3e; }
      .status-success { color: #38a169; }
      .status-info { color: #4299e1; }

      .progress-bar-wrap {
        background: #e2e8f0;
        border-radius: 4px;
        overflow: hidden;
        height: 6px;
        margin-top: 12px;
        display: none;
      }

      .progress-bar {
        height: 100%;
        background: #4299e1;
        width: 0%;
        transition: width 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>📄 Document Convertor</h1>
      <p class="subtitle">Convert your PDF to a Word document (.docx) instantly</p>

      <div class="drop-zone" id="dropZone">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p>Drag &amp; drop your PDF here, or <span id="browseLink">browse</span></p>
        <input type="file" id="fileInput" accept=".pdf,application/pdf" />
      </div>

      <p id="fileName"></p>

      <button id="convertBtn" disabled>Convert to Word</button>

      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <p id="status"></p>
    </div>

    <script>
      // Point PDF.js worker at the matching CDN build
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      const dropZone    = document.getElementById('dropZone');
      const fileInput   = document.getElementById('fileInput');
      const browseLink  = document.getElementById('browseLink');
      const fileNameEl  = document.getElementById('fileName');
      const convertBtn  = document.getElementById('convertBtn');
      const statusEl    = document.getElementById('status');
      const progressWrap = document.getElementById('progressWrap');
      const progressBar  = document.getElementById('progressBar');

      let selectedFile = null;

      function setStatus(msg, type = 'info') {
        statusEl.textContent = msg;
        statusEl.className = 'status-' + type;
      }

      function selectFile(file) {
        if (!file || file.type !== 'application/pdf') {
          setStatus('Please select a valid PDF file.', 'error');
          return;
        }
        selectedFile = file;
        fileNameEl.textContent = `Selected: ${file.name}`;
        convertBtn.disabled = false;
        setStatus('');
      }

      browseLink.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) selectFile(e.target.files[0]);
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) selectFile(e.dataTransfer.files[0]);
      });

      /**
       * Extract text lines from a PDF file using PDF.js.
       * Groups text items into lines by their vertical (y) position on each page.
       */
      async function extractLinesFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const lines = [];

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const content = await page.getTextContent();

          // Group text items by their rounded y-coordinate to reconstruct lines.
          // transform[5] is the y translation in the PDF transformation matrix.
          const lineMap = new Map();
          for (const item of content.items) {
            if (!item.str) continue; // skip items without text content
            const y = Math.round(item.transform[5]);
            if (!lineMap.has(y)) lineMap.set(y, []);
            lineMap.get(y).push(item.str);
          }

          // Sort lines top-to-bottom (higher y = higher on page in PDF coords)
          const sortedYs = Array.from(lineMap.keys()).sort((a, b) => b - a);
          for (const y of sortedYs) {
            const lineText = lineMap.get(y).join(' ').trim();
            if (lineText.length > 0) lines.push(lineText);
          }
        }

        return lines;
      }

      /**
       * Build a docx Document from an array of text lines.
       * Mirrors the heuristic used in the original server-side implementation.
       */
      function buildDocxFromLines(lines) {
        const { Document, Packer, Paragraph, TextRun, HeadingLevel } = docx;

        const paragraphs = lines.map((line) => {
          const isHeading =
            line.length > 0 &&
            line.length <= 80 &&
            line === line.toUpperCase() &&
            /[A-Z]/.test(line);

          if (isHeading) {
            return new Paragraph({
              heading: HeadingLevel.HEADING_1,
              children: [new TextRun({ text: line, bold: true })],
            });
          }

          return new Paragraph({ children: [new TextRun(line)] });
        });

        return new Document({
          sections: [{
            properties: {},
            children: paragraphs.length > 0
              ? paragraphs
              : [new Paragraph({ children: [new TextRun('')] })],
          }],
        });
      }

      convertBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        convertBtn.disabled = true;
        setStatus('Reading PDF…', 'info');
        progressWrap.style.display = 'block';
        progressBar.style.width = '20%';

        try {
          const lines = await extractLinesFromPDF(selectedFile);
          progressBar.style.width = '60%';

          setStatus('Generating Word document…', 'info');
          const doc = buildDocxFromLines(lines);
          const blob = await docx.Packer.toBlob(doc);
          progressBar.style.width = '100%';

          // Derive output filename from the original PDF name
          const baseName = selectedFile.name.replace(/\.pdf$/i, '');
          const outputFilename = `${baseName}.docx`;

          // Trigger browser download
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = outputFilename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          setStatus('✅ Conversion complete! Your download should start automatically.', 'success');
        } catch (err) {
          setStatus('❌ ' + err.message, 'error');
        } finally {
          convertBtn.disabled = false;
          setTimeout(() => {
            progressWrap.style.display = 'none';
            progressBar.style.width = '0%';
          }, 1500);
        }
      });
    </script>
  </body>
</html>
