<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Convertor — PDF to Word</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        padding: 48px 40px;
        width: 100%;
        max-width: 480px;
        text-align: center;
      }

      h1 {
        font-size: 1.6rem;
        color: #1a202c;
        margin-bottom: 6px;
      }

      .subtitle {
        color: #718096;
        font-size: 0.95rem;
        margin-bottom: 32px;
      }

      .drop-zone {
        border: 2px dashed #cbd5e0;
        border-radius: 8px;
        padding: 32px 16px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        margin-bottom: 24px;
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: #4299e1;
        background: #ebf8ff;
      }

      .drop-zone svg {
        width: 48px;
        height: 48px;
        margin-bottom: 12px;
        color: #a0aec0;
      }

      .drop-zone p {
        color: #4a5568;
        font-size: 0.9rem;
      }

      .drop-zone p span {
        color: #4299e1;
        text-decoration: underline;
        cursor: pointer;
      }

      #fileInput { display: none; }

      #fileName {
        font-size: 0.85rem;
        color: #2d3748;
        margin-bottom: 16px;
        min-height: 20px;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #4299e1;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover:not(:disabled) { background: #3182ce; }
      button:disabled { background: #a0aec0; cursor: not-allowed; }

      #status {
        margin-top: 18px;
        font-size: 0.9rem;
        min-height: 22px;
      }

      .status-error { color: #e53e3e; }
      .status-success { color: #38a169; }
      .status-info { color: #4299e1; }

      .progress-bar-wrap {
        background: #e2e8f0;
        border-radius: 4px;
        overflow: hidden;
        height: 6px;
        margin-top: 12px;
        display: none;
      }

      .progress-bar {
        height: 100%;
        background: #4299e1;
        width: 0%;
        transition: width 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>📄 Document Convertor</h1>
      <p class="subtitle">Convert your PDF to a Word document (.docx) instantly</p>

      <div class="drop-zone" id="dropZone">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
        </svg>
        <p>Drag &amp; drop your PDF here, or <span id="browseLink">browse</span></p>
        <input type="file" id="fileInput" accept=".pdf,application/pdf" />
      </div>

      <p id="fileName"></p>

      <button id="convertBtn" disabled>Convert to Word</button>

      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <p id="status"></p>
    </div>

    <script>
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const browseLink = document.getElementById('browseLink');
      const fileNameEl = document.getElementById('fileName');
      const convertBtn = document.getElementById('convertBtn');
      const statusEl = document.getElementById('status');
      const progressWrap = document.getElementById('progressWrap');
      const progressBar = document.getElementById('progressBar');

      let selectedFile = null;

      function setStatus(msg, type = 'info') {
        statusEl.textContent = msg;
        statusEl.className = 'status-' + type;
      }

      function selectFile(file) {
        if (!file || file.type !== 'application/pdf') {
          setStatus('Please select a valid PDF file.', 'error');
          return;
        }
        selectedFile = file;
        fileNameEl.textContent = `Selected: ${file.name}`;
        convertBtn.disabled = false;
        setStatus('');
      }

      browseLink.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) selectFile(e.target.files[0]);
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) selectFile(e.dataTransfer.files[0]);
      });

      convertBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        convertBtn.disabled = true;
        setStatus('Uploading and converting…', 'info');
        progressWrap.style.display = 'block';
        progressBar.style.width = '30%';

        const formData = new FormData();
        formData.append('file', selectedFile);

        try {
          const response = await fetch('/convert', { method: 'POST', body: formData });
          progressBar.style.width = '80%';

          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || 'Conversion failed.');
          }

          progressBar.style.width = '100%';

          // Trigger file download
          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const disposition = response.headers.get('Content-Disposition') || '';
          const match = disposition.match(/filename="?([^"]+)"?/);
          a.download = match ? match[1] : 'converted.docx';
          a.href = url;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          setStatus('✅ Conversion complete! Your download should start automatically.', 'success');
        } catch (err) {
          setStatus('❌ ' + err.message, 'error');
        } finally {
          convertBtn.disabled = false;
          setTimeout(() => {
            progressWrap.style.display = 'none';
            progressBar.style.width = '0%';
          }, 1500);
        }
      });
    </script>
  </body>
</html>
